<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>快乐套圈圈</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: #fdf6f8;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .game-container {
      width: 100vw;
      height: 100vh;
      max-width: 480px;
      background: linear-gradient(to bottom, #f8efff, #e8f8ff);
      position: relative;
      overflow: hidden;
    }
    .home {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }
    .title {
      font-size: 32px;
      color: #ff69b4;
      font-weight: bold;
      text-shadow: 0 0 10px #fff;
    }
    .btn {
      padding: 14px 30px;
      background: #ff8fc6;
      color: white;
      border-radius: 50px;
      font-size: 16px;
      border: none;
      box-shadow: 0 4px 10px #0001;
    }
    .tip {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
    .game {
      width: 100%;
      height: 100%;
      display: none;
      position: relative;
    }
    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 40%;
      background: #b7e8a6;
      border-top-left-radius: 50% 20px;
      border-top-right-radius: 50% 20px;
    }
    .stage {
      position: absolute;
      bottom: 35%;
      width: 100%;
      height: 220px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 20px;
    }
    .prize {
      width: 40px;
      height: 50px;
      background: #ffdae0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      text-align: center;
      box-shadow: 0 2px 5px #0002;
    }
    .ring {
      width: 50px;
      height: 50px;
      border: 4px solid #ff69b4;
      border-radius: 50%;
      position: absolute;
      bottom: 120px;
      left: calc(50% - 25px);
      pointer-events: none;
      transition: none;
      z-index: 99;
    }
    .aim-line {
      position: absolute;
      bottom: 120px;
      left: 50%;
      width: 2px;
      height: 280px;
      background: #ff69b466;
      transform-origin: bottom center;
      pointer-events: none;
      display: none;
    }
    .collection {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      padding: 20px;
      display: none;
      overflow-y: auto;
    }
    .collect-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    .item {
      aspect-ratio: 1/1;
      background: #f4f4f4;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .item.active {
      background: #ffdae0;
      color: #c44;
      font-weight: bold;
    }
    .float-btn {
      position: absolute;
      z-index: 999;
      padding: 8px 12px;
      background: #ff8fc6;
      color: white;
      border-radius: 50px;
      font-size: 12px;
      border: none;
    }
    .back-btn { top: 40px; left: 20px; }
    .reset-btn { bottom: 120px; right: 20px; }
    .mode-btn { top: 40px; right: 20px; }
    .share-btn { top: 90px; right: 20px; }
    .collect-btn { top: 140px; right: 20px; }
  </style>
</head>
<body>

<audio id="successAudio" preload="auto">
  <source src="https://cdn.jsdelivr.net/gh/faylynn/audio/success.wav" type="audio/wav">
</audio>

<audio id="failAudio" preload="auto">
  <source src="https://cdn.jsdelivr.net/gh/faylynn/audio/fail.wav" type="audio/wav">
</audio>

<div class="game-container">
  <div class="home" id="home">
    <div class="title">快乐套圈圈</div>
    <button class="btn" onclick="startGame()">开始游戏</button>
    <div class="tip">向后拉越远，扔得越远！</div>
    <div class="tip">无广告·无限次·全家一起玩</div>
  </div>

  <div class="game" id="game">
    <div class="ground"></div>
    <div class="stage" id="stage"></div>
    <div class="ring" id="ring"></div>
    <div class="aim-line" id="aimLine"></div>

    <button class="float-btn back-btn" onclick="goHome()">返回</button>
    <button class="float-btn reset-btn" onclick="resetRing()">重置</button>
    <button class="float-btn mode-btn" onclick="switchMode()" id="modeBtn">萌新模式</button>
    <button class="float-btn share-btn" onclick="doShare()">分享战绩</button>
    <button class="float-btn collect-btn" onclick="openCollection()">我的收藏</button>
  </div>

  <div class="collection" id="collection">
    <button class="float-btn back-btn" onclick="closeCollection()">返回</button>
    <div style="font-size:20px; font-weight:bold; color:#ff69b4;">我的收藏</div>
    <div class="collect-grid" id="collectGrid"></div>
  </div>
</div>

<script>
  const prizes = [
    "玉桂狗", "库洛米", "美乐蒂", "帕恰狗", "拉布布", "HelloKitty",
    "阿奇", "天天", "毛毛", "大白鹅", "垂耳兔", "小仓鼠"
  ];
  let collected = [];
  let isHardMode = false;

  const successAudio = document.getElementById("successAudio");
  const failAudio = document.getElementById("failAudio");

  const home = document.getElementById("home");
  const game = document.getElementById("game");
  const collection = document.getElementById("collection");
  const ring = document.getElementById("ring");
  const aimLine = document.getElementById("aimLine");
  const stage = document.getElementById("stage");
  const collectGrid = document.getElementById("collectGrid");
  const modeBtn = document.getElementById("modeBtn");

  function buildStage() {
    stage.innerHTML = "";
    prizes.forEach(name => {
      let div = document.createElement("div");
      div.className = "prize";
      div.innerText = name;
      div.dataset.name = name;
      stage.appendChild(div);
    });
  }

  function buildCollection() {
    collectGrid.innerHTML = "";
    prizes.forEach(name => {
      let item = document.createElement("div");
      item.className = "item";
      if (collected.includes(name)) item.classList.add("active");
      item.innerText = name;
      collectGrid.appendChild(item);
    });
  }

  function startGame() {
    home.style.display = "none";
    game.style.display = "block";
    buildStage();
    buildCollection();
  }

  function goHome() {
    game.style.display = "none";
    collection.style.display = "none";
    home.style.display = "flex";
  }

  function openCollection() {
    game.style.display = "none";
    collection.style.display = "block";
    buildCollection();
  }

  function closeCollection() {
    collection.style.display = "none";
    game.style.display = "block";
  }

  function switchMode() {
    isHardMode = !isHardMode;
    modeBtn.innerText = isHardMode ? "挑战模式" : "萌新模式";
    ring.style.width = isHardMode ? "36px" : "50px";
    ring.style.height = isHardMode ? "36px" : "50px";
  }

  function doShare() {
    alert(`我套中了 ${collected.length} 个奖品！快来玩快乐套圈圈～`);
  }

  let startX = 0, startY = 0;
  let dragging = false;

  document.addEventListener("touchstart", e => {
    if (game.style.display !== "block") return;
    dragging = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    aimLine.style.display = "block";
  });

  document.addEventListener("touchmove", e => {
    if (!dragging) return;
    let x = e.touches[0].clientX;
    let dx = x - startX;
    let angle = dx * 0.3;
    aimLine.style.transform = `rotate(${angle}deg)`;
  });

  document.addEventListener("touchend", async e => {
    if (!dragging) return;
    dragging = false;
    aimLine.style.display = "none";

    let endY = e.changedTouches[0].clientY;
    let power = Math.min(500, Math.max(80, (startY - endY) * 2.5));
    let angle = (e.changedTouches[0].clientX - startX) * 0.3;

    ring.style.transition = "all 0.7s cubic-bezier(0.1, 0.7, 0.3, 1)";
    ring.style.transform = `rotate(${angle}deg)`;
    ring.style.bottom = `${120 + power}px`;
    ring.style.left = `${window.innerWidth / 2 - (ring.offsetWidth / 2) + (e.changedTouches[0].clientX - startX) * 1.2}px`;

    await sleep(700);
    let hasHit = checkHit();
    await sleep(800);
    resetRing();
  });

  // 严格判定：只有圈完全包裹奖品才算套中
  function checkHit() {
    let r = ring.getBoundingClientRect();
    let ringCenterX = r.left + r.width / 2;
    let ringCenterY = r.top + r.height / 2;
    let ringRadius = r.width / 2;
    let hasHit = false;

    document.querySelectorAll(".prize").forEach(el => {
      let p = el.getBoundingClientRect();
      let prizeCenterX = p.left + p.width / 2;
      let prizeCenterY = p.top + p.height / 2;

      let dx = prizeCenterX - ringCenterX;
      let dy = prizeCenterY - ringCenterY;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < ringRadius - 3) {
        hasHit = true;
        let name = el.dataset.name;
        if (!collected.includes(name)) collected.push(name);
        playSuccess();
        alert("🎉 套中了：" + name);
      }
    });

    if (!hasHit) {
      playFail();
    }
    return hasHit;
  }

  function playSuccess() {
    successAudio.currentTime = 0;
    successAudio.play().catch(() => {});
  }

  function playFail() {
    failAudio.currentTime = 0;
    failAudio.play().catch(() => {});
  }

  function resetRing() {
    ring.style.transition = "none";
    ring.style.transform = "rotate(0deg)";
    ring.style.bottom = "120px";
    ring.style.left = "calc(50% - " + (ring.offsetWidth / 2) + "px)";
  }

  function sleep(t) {
    return new Promise(r => setTimeout(r, t));
  }
</script>
</body>
</html>
