<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>三丽鸥消消乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #FFE6F2, #E6F3FF);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        .game-container {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            width: 100%;
        }

        .score-box {
            font-size: 16px;
            font-weight: bold;
            color: #FF69B4;
            background: #FFF0F7;
            padding: 6px 12px;
            border-radius: 50px;
        }

        .game-title {
            font-size: 20px;
            color: #FF69B4;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-gap: 6px;
            background: #F8F9FA;
            padding: 10px;
            border-radius: 15px;
            width: 100%;
        }

        .grid-cell {
            aspect-ratio: 1/1;
            border-radius: 12px;
            background: #FFF0F7;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
            position: relative;
        }

        /* 新增：选中格子的高亮样式 */
        .grid-cell.selected {
            transform: scale(1.1);
            border: 3px solid #FF1493;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.6);
            background: #FFEFF7;
        }

        .character {
            width: 85%;
            height: 85%;
            border-radius: 10px;
            transition: all 0.3s ease;
            object-fit: cover;
            user-select: none;
            pointer-events: none;
        }

        @keyframes eliminate {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; filter: brightness(1.5); }
            100% { transform: scale(0); opacity: 0; }
        }

        .eliminate {
            animation: eliminate 0.5s ease forwards;
        }

        @keyframes appear {
            0% { transform: translateY(-50px); opacity: 0; scale: 0.5; }
            70% { transform: translateY(10px); opacity: 1; scale: 1.1; }
            100% { transform: translateY(0); scale: 1; }
        }

        .appear {
            animation: appear 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes swap {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .swap {
            animation: swap 0.3s ease forwards;
        }

        @keyframes scorePopup {
            0% { transform: translateY(0); opacity: 1; font-size: 14px; }
            100% { transform: translateY(-30px); opacity: 0; font-size: 16px; }
        }

        .score-popup {
            position: absolute;
            color: #FF1493;
            font-weight: bold;
            pointer-events: none;
            animation: scorePopup 0.8s ease forwards;
            z-index: 100;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .game-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }

        .game-result {
            font-size: 24px;
            color: #FF69B4;
            margin-bottom: 15px;
        }

        .final-score {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
        }

        .restart-btn {
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score-box">分数: <span id="score">0</span></div>
            <h1 class="game-title">三丽鸥消消乐</h1>
        </div>
        
        <div class="game-grid" id="gameGrid"></div>
        
        <div class="game-overlay" id="gameOverlay">
            <div class="overlay-content">
                <div class="game-result" id="gameResult">游戏胜利！</div>
                <div class="final-score">最终得分: <span id="finalScore">0</span></div>
                <button class="restart-btn" id="restartBtn">再来一局</button>
            </div>
        </div>
    </div>

    <script>
        const characters = [
             { name: 'hello kitty', src: 'image/11.jpg' }, // 占位图1
            { name: 'melody', src: 'image/22.jpg' },     // 占位图2
            { name: 'kuromi', src: 'image/33.jpg' },     // 占位图3
            { name: 'pompompurin', src: 'image/44.jpg' },// 占位图4
            { name: 'cinnamoroll', src: 'image/55.jpg' },// 占位图5
            { name: 'pochacco', src: 'image/66.jpg' }     // 占位图6
        ];

        const config = { rows:6, cols:6, minMatch:3, baseScore:10 };
        let gameState = { grid:[], score:0, selectedCell:null, isAnimating:false, gameOver:false };

        const gameGrid = document.getElementById('gameGrid');
        const scoreElement = document.getElementById('score');
        const gameOverlay = document.getElementById('gameOverlay');
        const gameResult = document.getElementById('gameResult');
        const finalScore = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        function initGame() {
            gameState.grid = [];
            gameState.score = 0;
            gameState.selectedCell = null;
            gameState.isAnimating = false;
            gameState.gameOver = false;
            scoreElement.textContent = '0';
            gameOverlay.classList.remove('active');
            gameGrid.innerHTML = '';

            for(let row=0;row<config.rows;row++){
                gameState.grid[row] = [];
                for(let col=0;col<config.cols;col++){
                    const c = characters[Math.floor(Math.random()*characters.length)];
                    const el = createCell(row,col,c);
                    gameState.grid[row][col] = {character:c,row,col,element:el};
                    gameGrid.appendChild(el);
                }
            }

            while(checkAllMatches().length>0) regenerateGrid();
        }

        function createCell(row,col,c){
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            const img = document.createElement('img');
            img.className = 'character appear';
            img.src = c.src;
            cell.appendChild(img);
            cell.onclick = ()=>handleCellClick(row,col);
            return cell;
        }

        function handleCellClick(r,c){
            if(gameState.isAnimating||gameState.gameOver) return;
            const cell = gameState.grid[r][c];
            
            // 清除上一个选中格子的样式
            if(gameState.selectedCell) {
                gameState.selectedCell.element.classList.remove('selected');
            }

            // 第一次点击
            if(!gameState.selectedCell){
                gameState.selectedCell = cell;
                cell.element.classList.add('selected'); // 添加选中样式
                return;
            }

            // 点击同一个单元格
            if(gameState.selectedCell.row===r&&gameState.selectedCell.col===c){
                cell.element.classList.remove('selected'); // 移除选中样式
                gameState.selectedCell = null;
                return;
            }

            // 检查是否相邻
            if(!isAdjacent(gameState.selectedCell,cell)){
                gameState.selectedCell = cell;
                cell.element.classList.add('selected'); // 切换选中样式到新格子
                return;
            }

            // 交换元素
            swap(gameState.selectedCell,cell);
        }

        function isAdjacent(a,b){
            const dr=Math.abs(a.row-b.row),dc=Math.abs(a.col-b.col);
            return (dr===1&&dc===0)||(dr===0&&dc===1);
        }

        function swap(a,b){
            gameState.isAnimating = true;
            // 清除选中样式
            a.element.classList.remove('selected');
            
            const ia = a.element.querySelector('img'), ib=b.element.querySelector('img');
            const t = ia.src; ia.src=ib.src; ib.src=t;
            ia.classList.add('swap'); ib.classList.add('swap');
            const tc=a.character; a.character=b.character; b.character=tc;
            gameState.selectedCell=null;
            
            setTimeout(()=>{
                ia.classList.remove('swap'); ib.classList.remove('swap');
                const m=checkAllMatches();
                if(m.length>0) eliminateMatches(m);
                else setTimeout(()=>{
                    const t=ia.src; ia.src=ib.src; ib.src=t;
                    const tc=a.character; a.character=b.character; b.character=tc;
                    gameState.isAnimating=false;
                },300);
            },300);
        }

        function checkAllMatches(){
            const m=[];
            for(let r=0;r<config.rows;r++){
                for(let c=0;c<=config.cols-config.minMatch;c++){
                    const g=[gameState.grid[r][c]];
                    for(let i=1;i<config.minMatch;i++) if(gameState.grid[r][c+i].character.name===g[0].character.name) g.push(gameState.grid[r][c+i]); else break;
                    if(g.length>=config.minMatch) m.push(g),c+=g.length-1;
                }
            }
            for(let c=0;c<config.cols;c++){
                for(let r=0;r<=config.rows-config.minMatch;r++){
                    const g=[gameState.grid[r][c]];
                    for(let i=1;i<config.minMatch;i++) if(gameState.grid[r+i][c].character.name===g[0].character.name) g.push(gameState.grid[r+i][c]); else break;
                    if(g.length>=config.minMatch) m.push(g),r+=g.length-1;
                }
            }
            return m;
        }

        function eliminateMatches(matches){
            matches.forEach(g=>g.forEach(cell=>{
                cell.element.querySelector('img').classList.add('eliminate');
                addScore(cell.row,cell.col,g.length);
            }));
            gameState.score += matches.flat().length*config.baseScore;
            scoreElement.textContent=gameState.score;
            setTimeout(()=>{
                fill();
                setTimeout(()=>{
                    const nm=checkAllMatches();
                    if(nm.length>0) eliminateMatches(nm);
                    else { if(!hasMove()) end(); gameState.isAnimating=false; }
                },500);
            },500);
        }

        function addScore(r,c,n){
            const p=document.createElement('div');
            p.className='score-popup';
            p.textContent=`+${n*config.baseScore}`;
            const rect=gameState.grid[r][c].element.getBoundingClientRect();
            const g=gameGrid.getBoundingClientRect();
            p.style.left=rect.left-g.left+rect.width/2+'px';
            p.style.top=rect.top-g.top+rect.height/2+'px';
            gameGrid.appendChild(p);
            setTimeout(()=>p.remove(),800);
        }

        function fill(){
            for(let c=0;c<config.cols;c++){
                const non=[];
                for(let r=0;r<config.rows;r++) if(!gameState.grid[r][c].element.querySelector('img').classList.contains('eliminate')) non.push(gameState.grid[r][c]);
                for(let r=0;r<config.rows;r++){
                    const cell=gameState.grid[r][c];
                    const img=cell.element.querySelector('img');
                    if(r<config.rows-non.length){
                        cell.character=characters[Math.floor(Math.random()*characters.length)];
                        img.src=cell.character.src;
                        img.classList.remove('eliminate');
                        img.classList.add('appear');
                        setTimeout(()=>img.classList.remove('appear'),600);
                    }else{
                        const t=non[r-(config.rows-non.length)];
                        cell.character=t.character;
                        img.src=t.character.src;
                        img.classList.remove('eliminate');
                    }
                }
            }
        }

        function hasMove(){
            for(let r=0;r<config.rows;r++){
                for(let c=0;c<config.cols;c++){
                    if(c<config.cols-1){
                        const t=gameState.grid[r][c].character;
                        gameState.grid[r][c].character=gameState.grid[r][c+1].character;
                        gameState.grid[r][c+1].character=t;
                        if(checkAllMatches().length>0){
                            gameState.grid[r][c+1].character=gameState.grid[r][c].character;
                            gameState.grid[r][c].character=t;
                            return true;
                        }
                        gameState.grid[r][c+1].character=gameState.grid[r][c].character;
                        gameState.grid[r][c].character=t;
                    }
                    if(r<config.rows-1){
                        const t=gameState.grid[r][c].character;
                        gameState.grid[r][c].character=gameState.grid[r+1][c].character;
                        gameState.grid[r+1][c].character=t;
                        if(checkAllMatches().length>0){
                            gameState.grid[r+1][c].character=gameState.grid[r][c].character;
                            gameState.grid[r][c].character=t;
                            return true;
                        }
                        gameState.grid[r+1][c].character=gameState.grid[r][c].character;
                        gameState.grid[r][c].character=t;
                    }
                }
            }
            return false;
        }

        function regenerateGrid(){
            for(let r=0;r<config.rows;r++) for(let c=0;c<config.cols;c++){
                gameState.grid[r][c].character=characters[Math.floor(Math.random()*characters.length)];
                gameState.grid[r][c].element.querySelector('img').src=gameState.grid[r][c].character.src;
            }
        }

        function end(){
            gameState.gameOver=true;
            gameResult.textContent=gameState.score>=500?'游戏胜利！':'游戏结束';
            finalScore.textContent=gameState.score;
            gameOverlay.classList.add('active');
        }

        restartBtn.onclick=initGame;
        window.onload=initGame;
    </script>
</body>
</html>
